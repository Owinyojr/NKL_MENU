<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Redcliff — Chef Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --crimson:#8B0000; --crimson-light:#a50000;
      --gold:#C9A84C; --deep:#0f0404; --panel:#1c0d0d;
      --card:#241010; --border:rgba(201,168,76,0.2);
      --cream:#F9F3E8; --muted:#7a6060;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:var(--deep); color:var(--cream); font-family:'Montserrat',sans-serif; min-height:100vh; }

    /* ── LOGIN ── */
    #loginScreen {
      display:flex; align-items:center; justify-content:center; min-height:100vh;
      background:radial-gradient(ellipse at 50% 0%, rgba(139,0,0,.3) 0%, transparent 60%);
    }
    .login-card {
      background:var(--panel); border:1px solid var(--border);
      padding:56px 48px; width:100%; max-width:420px; text-align:center;
    }
    .login-card h1 { font-family:'Playfair Display',serif; font-size:2.4rem; }
    .login-card .sub {
      font-size:.6rem; letter-spacing:.35em; text-transform:uppercase;
      color:var(--gold); margin-bottom:40px; display:block; margin-top:4px;
    }
    .form-group { margin-bottom:20px; text-align:left; }
    .form-group label {
      display:block; font-size:.6rem; letter-spacing:.25em;
      text-transform:uppercase; color:var(--muted); margin-bottom:8px;
    }
    .form-group input {
      width:100%; background:rgba(255,255,255,.04); border:1px solid var(--border);
      color:var(--cream); font-family:'Montserrat',sans-serif; font-size:.9rem;
      padding:12px 16px; outline:none; transition:border .2s;
    }
    .form-group input:focus { border-color:var(--gold); }
    .btn-primary {
      width:100%; background:var(--crimson); color:var(--cream); border:none;
      font-family:'Montserrat',sans-serif; font-size:.65rem;
      letter-spacing:.3em; text-transform:uppercase; padding:14px;
      cursor:pointer; margin-top:8px; transition:background .2s;
    }
    .btn-primary:hover { background:var(--crimson-light); }
    .login-error { color:#e74c3c; font-size:.75rem; margin-top:12px; display:none; }

    /* ── PANEL ── */
    #adminPanel { display:none; }
    .topbar {
      background:var(--panel); border-bottom:1px solid var(--border);
      padding:16px 32px; display:flex; align-items:center; justify-content:space-between;
      position:sticky; top:0; z-index:100;
    }
    .topbar-brand { font-family:'Playfair Display',serif; font-size:1.4rem; }
    .topbar-brand span {
      font-size:.55rem; font-family:'Montserrat',sans-serif;
      letter-spacing:.3em; text-transform:uppercase; color:var(--gold); display:block;
    }
    .topbar-actions { display:flex; gap:12px; align-items:center; }
    .btn-outline {
      background:transparent; border:1px solid var(--border); color:var(--muted);
      font-family:'Montserrat',sans-serif; font-size:.6rem;
      letter-spacing:.2em; text-transform:uppercase; padding:8px 18px;
      cursor:pointer; transition:all .2s; text-decoration:none; display:inline-block;
    }
    .btn-outline:hover { border-color:var(--gold); color:var(--gold); }
    .btn-save {
      background:var(--crimson); border:none; color:var(--cream);
      font-family:'Montserrat',sans-serif; font-size:.6rem;
      letter-spacing:.25em; text-transform:uppercase; padding:10px 24px;
      cursor:pointer; transition:background .2s;
    }
    .btn-save:hover { background:var(--crimson-light); }
    .btn-save:disabled { opacity:.5; cursor:not-allowed; }

    .admin-content { max-width:1100px; margin:0 auto; padding:40px 24px 80px; }
    .page-title {
      font-size:.6rem; letter-spacing:.35em; text-transform:uppercase;
      color:var(--gold); margin-bottom:32px;
    }

    .section-tabs { display:flex; gap:4px; margin-bottom:32px; flex-wrap:wrap; }
    .tab-btn {
      background:transparent; border:1px solid var(--border); color:var(--muted);
      font-family:'Montserrat',sans-serif; font-size:.6rem;
      letter-spacing:.2em; text-transform:uppercase; padding:10px 20px;
      cursor:pointer; transition:all .2s;
    }
    .tab-btn.active { background:var(--crimson); border-color:var(--crimson); color:var(--cream); }

    .editor-section { display:none; }
    .editor-section.active { display:block; }

    .section-meta {
      background:var(--card); border:1px solid var(--border);
      padding:24px; margin-bottom:24px;
    }
    .section-meta label {
      font-size:.55rem; letter-spacing:.25em; text-transform:uppercase;
      color:var(--muted); display:block; margin-bottom:6px;
    }
    .section-meta input, .section-meta textarea {
      width:100%; background:rgba(255,255,255,.04); border:1px solid var(--border);
      color:var(--cream); font-family:'Montserrat',sans-serif; font-size:.85rem;
      padding:10px 14px; outline:none; margin-bottom:16px; transition:border .2s; resize:vertical;
    }
    .section-meta input:focus, .section-meta textarea:focus { border-color:var(--gold); }

    .category-editor {
      background:var(--card); border:1px solid var(--border);
      margin-bottom:16px; overflow:hidden;
    }
    .cat-header {
      display:flex; align-items:center; gap:12px; padding:14px 20px;
      background:rgba(255,255,255,.03); border-bottom:1px solid var(--border);
    }
    .cat-header input {
      flex:1; background:transparent; border:none; color:var(--cream);
      font-family:'Montserrat',sans-serif; font-size:.75rem;
      font-weight:600; letter-spacing:.15em; text-transform:uppercase; outline:none;
    }
    .btn-danger {
      background:transparent; border:1px solid rgba(192,57,43,.4); color:#c0392b;
      font-family:'Montserrat',sans-serif; font-size:.55rem;
      letter-spacing:.15em; text-transform:uppercase; padding:5px 12px;
      cursor:pointer; transition:all .2s;
    }
    .btn-danger:hover { background:rgba(192,57,43,.15); }
    .cat-items { padding:16px 20px; }

    .item-row {
      display:grid; grid-template-columns:2fr 3fr 1fr auto;
      gap:10px; align-items:center; margin-bottom:10px;
    }
    .item-row input {
      background:rgba(255,255,255,.04); border:1px solid var(--border);
      color:var(--cream); font-family:'Montserrat',sans-serif; font-size:.78rem;
      padding:9px 12px; outline:none; width:100%; transition:border .2s;
    }
    .item-row input:focus { border-color:var(--gold); }
    .item-row input::placeholder { color:var(--muted); font-style:italic; }
    .btn-icon {
      background:transparent; border:none; color:var(--muted);
      font-size:1.1rem; cursor:pointer; padding:6px; transition:color .2s; line-height:1;
    }
    .btn-icon:hover { color:#c0392b; }

    .btn-add-item, .btn-add-cat {
      background:transparent; border:1px dashed var(--border); color:var(--muted);
      width:100%; font-family:'Montserrat',sans-serif; font-size:.6rem;
      letter-spacing:.2em; text-transform:uppercase; padding:10px;
      cursor:pointer; transition:all .2s; margin-top:8px;
    }
    .btn-add-cat { padding:14px; }
    .btn-add-item:hover, .btn-add-cat:hover { border-color:var(--gold); color:var(--gold); }

    /* ── TOAST ── */
    #toast {
      position:fixed; bottom:32px; right:32px;
      font-family:'Montserrat',sans-serif; font-size:.7rem; letter-spacing:.1em;
      padding:14px 24px; transform:translateY(80px); opacity:0;
      transition:all .3s; z-index:999;
    }
    #toast.success { background:#27ae60; color:white; }
    #toast.error   { background:#c0392b; color:white; }
    #toast.show    { transform:translateY(0); opacity:1; }

    /* ── MEAL PERIOD CONTROL ── */
    .meal-period-control {
      background: var(--card);
      border: 1px solid var(--border);
      padding: 20px 24px;
      margin-bottom: 28px;
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }
    .meal-period-label {
      font-size: .55rem;
      letter-spacing: .3em;
      text-transform: uppercase;
      color: var(--muted);
      flex-shrink: 0;
    }
    .meal-toggle-admin {
      display: flex;
      align-items: center;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      overflow: hidden;
    }
    .meal-btn-admin {
      background: transparent;
      border: none;
      color: var(--muted);
      font-family: 'Montserrat', sans-serif;
      font-size: .6rem;
      letter-spacing: .25em;
      text-transform: uppercase;
      padding: 10px 22px;
      cursor: pointer;
      transition: all .25s;
      display: flex;
      align-items: center;
      gap: 7px;
    }
    .meal-btn-admin.active-lunch { background: rgba(201,168,76,0.15); color: var(--gold); }
    .meal-btn-admin.active-dinner { background: rgba(139,0,0,0.35); color: var(--cream); }
    .meal-divider-admin { width:1px; height:34px; background: var(--border); }
    .meal-period-hint {
      font-size: .55rem;
      letter-spacing: .15em;
      color: var(--muted);
      font-style: italic;
      margin-left: auto;
    }
    .meal-period-hint strong { color: var(--gold); font-style: normal; }

    @media(max-width:640px){
      .item-row { grid-template-columns:1fr 1fr; }
      .item-row input:nth-child(2) { grid-column:1 / -1; }
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-card">
    <h1>Redcliff</h1>
    <span class="sub">Chef Administration Portal</span>
    <div class="form-group">
      <label>Username</label>
      <input type="text" id="loginUser" placeholder="chef" autocomplete="username"/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="loginPass" placeholder="••••••••" autocomplete="current-password"/>
    </div>
    <button class="btn-primary" onclick="doLogin()">Sign In</button>
    <p class="login-error" id="loginError">Invalid credentials. Please try again.</p>
  </div>
</div>

<!-- ADMIN -->
<div id="adminPanel">
  <div class="topbar">
    <div class="topbar-brand">
      Redcliff
      <span>Menu Management</span>
    </div>
    <div class="topbar-actions">
      <a href="index.html" target="_blank" class="btn-outline">View Live Menu ↗</a>
      <button class="btn-save" id="saveBtn" onclick="saveMenu()">Save &amp; Publish</button>
      <button class="btn-outline" onclick="doLogout()">Sign Out</button>
    </div>
  </div>
  <div class="admin-content">
    <p class="page-title">Today's Menu — <span id="adminDate"></span></p>

    <!-- MEAL PERIOD TOGGLE -->
    <div class="meal-period-control">
      <span class="meal-period-label">Service Period</span>
      <div class="meal-toggle-admin">
        <button class="meal-btn-admin active-lunch" id="adminLunchBtn" onclick="adminSetMeal('lunch')">
          ☀️ Lunch &nbsp;<small style="opacity:.6">12:00–15:00</small>
        </button>
        <div class="meal-divider-admin"></div>
        <button class="meal-btn-admin" id="adminDinnerBtn" onclick="adminSetMeal('dinner')">
          🌙 Dinner &nbsp;<small style="opacity:.6">18:00–22:00</small>
        </button>
      </div>
      <span class="meal-period-hint">Guests will see <strong id="mealPeriodHintText">Lunch</strong> displayed on their menu</span>
    </div>

    <div class="section-tabs" id="sectionTabs"></div>
    <div id="editorArea"></div>
  </div>
</div>

<div id="toast"></div>

<!-- ═══════════════════════════════════════════════════════════
     FIREBASE CONFIG — REPLACE THE OBJECT BELOW WITH YOURS
     ═══════════════════════════════════════════════════════════ -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  // ⬇⬇  PASTE YOUR FIREBASE CONFIG HERE  ⬇⬇
  const firebaseConfig = {
    apiKey:            "AIzaSyDcDGxVdcVIJfW1Tij8AHw4P2KmVT4IUsM",
    authDomain:        "nkl-menu.firebaseapp.com",
    projectId:         "nkl-menu",
    storageBucket:     "nkl-menu.firebasestorage.app",
    messagingSenderId: "997554521363",
    appId:             "1:997554521363:web:8fbea8e147e4562e1d46e6"
  };
  // ⬆⬆  END OF CONFIG  ⬆⬆

  // ── CREDENTIALS — change these! ─────────────────────────────────────
  const CREDENTIALS = { username: 'chef', password: 'redcliff2024' };

  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);

  let menuData = {};
  let activeSection = '';
  let currentMealPeriod = 'lunch';

  // ── MEAL PERIOD ADMIN TOGGLE ─────────────────────────────────────────
  window.adminSetMeal = function(period) {
    currentMealPeriod = period;
    const lBtn = document.getElementById('adminLunchBtn');
    const dBtn = document.getElementById('adminDinnerBtn');
    const hint = document.getElementById('mealPeriodHintText');
    lBtn.className = 'meal-btn-admin' + (period === 'lunch' ? ' active-lunch' : '');
    dBtn.className = 'meal-btn-admin' + (period === 'dinner' ? ' active-dinner' : '');
    if (hint) hint.textContent = period === 'lunch' ? 'Lunch' : 'Dinner';
  };

  // ── AUTH ────────────────────────────────────────────────────────────
  window.doLogin = async function() {
    const u = document.getElementById('loginUser').value.trim();
    const p = document.getElementById('loginPass').value;
    if (u === CREDENTIALS.username && p === CREDENTIALS.password) {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('adminPanel').style.display = 'block';
      document.getElementById('adminDate').textContent =
        new Date().toLocaleDateString('en-KE',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
      await loadMenu();
    } else {
      document.getElementById('loginError').style.display = 'block';
    }
  };

  document.getElementById('loginPass').addEventListener('keydown', e => {
    if (e.key === 'Enter') window.doLogin();
  });

  window.doLogout = function() {
    document.getElementById('adminPanel').style.display = 'none';
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('loginUser').value = '';
    document.getElementById('loginPass').value = '';
  };

  // ── LOAD FROM FIRESTORE ─────────────────────────────────────────────
  async function loadMenu() {
    try {
      const snap = await getDoc(doc(db, 'menu', 'current'));
      menuData = snap.exists() ? snap.data().sections : getDefaultMenu();
      if (snap.exists() && snap.data().mealPeriod) {
        window.adminSetMeal(snap.data().mealPeriod);
      }
    } catch(e) {
      console.error(e);
      menuData = getDefaultMenu();
      showToast('Could not connect to database. Using local defaults.', 'error');
    }
    renderTabs();
  }

  // ── SAVE TO FIRESTORE ───────────────────────────────────────────────
  window.saveMenu = async function() {
    document.activeElement?.blur();
    const btn = document.getElementById('saveBtn');
    btn.disabled = true;
    btn.textContent = 'Saving…';
    await new Promise(r => setTimeout(r, 150)); // let blur events settle

    try {
      await setDoc(doc(db, 'menu', 'current'), {
        sections: menuData,
        mealPeriod: currentMealPeriod,
        updatedAt: new Date().toISOString()
      });
      showToast('✓ Menu saved — customers see it now', 'success');
    } catch(e) {
      console.error(e);
      showToast('❌ Save failed: ' + e.message, 'error');
    }
    btn.disabled = false;
    btn.textContent = 'Save & Publish';
  };

  // ── RENDER ──────────────────────────────────────────────────────────
  function renderTabs() {
    const tabs = document.getElementById('sectionTabs');
    tabs.innerHTML = '';
    const keys = Object.keys(menuData);
    if (!activeSection || !menuData[activeSection]) activeSection = keys[0];

    keys.forEach(key => {
      const btn = document.createElement('button');
      btn.className = 'tab-btn' + (key === activeSection ? ' active' : '');
      btn.textContent = menuData[key].label;
      btn.onclick = () => { activeSection = key; renderTabs(); renderEditor(); };
      tabs.appendChild(btn);
    });
    renderEditor();
  }

  function renderEditor() {
    const area = document.getElementById('editorArea');
    area.innerHTML = '';
    const sec = menuData[activeSection];
    if (!sec) return;

    const div = document.createElement('div');
    div.className = 'editor-section active';

    let html = `<div class="section-meta">
      <label>Section Label</label>
      <input type="text" value="${esc(sec.label)}"
        onchange="updateSection('${activeSection}','label',this.value); renderTabsOnly();" />`;

    if (activeSection === 'buffet') {
      html += `
      <label>Buffet Note / Description</label>
      <textarea rows="2" onchange="updateSection('${activeSection}','note',this.value)">${esc(sec.note||'')}</textarea>
      <label>Buffet Price</label>
      <input type="text" value="${esc(sec.price||'')}"
        onchange="updateSection('${activeSection}','price',this.value)" />`;
    }
    html += `</div>`;

    const cats = sec.categories || {};
    Object.entries(cats).forEach(([catName, items], ci) => {
      html += `<div class="category-editor">
        <div class="cat-header">
          <input type="text" value="${esc(catName)}" placeholder="Category Name"
            onchange="renameCat('${activeSection}',${ci},this.value)" />
          <button class="btn-danger" onclick="deleteCat('${activeSection}',${ci})">Remove</button>
        </div>
        <div class="cat-items">`;

      (items||[]).forEach((item, ii) => {
        html += `<div class="item-row">
          <input type="text" value="${esc(item.name)}" placeholder="Dish name"
            onchange="updateItem('${activeSection}',${ci},${ii},'name',this.value)" />
          <input type="text" value="${esc(item.desc)}" placeholder="Description (optional)"
            onchange="updateItem('${activeSection}',${ci},${ii},'desc',this.value)" />
          <input type="text" value="${esc(item.price)}" placeholder="Price"
            onchange="updateItem('${activeSection}',${ci},${ii},'price',this.value)" />
          <button class="btn-icon" onclick="deleteItem('${activeSection}',${ci},${ii})" title="Remove">✕</button>
        </div>`;
      });

      html += `<button class="btn-add-item" onclick="addItem('${activeSection}',${ci})">+ Add Item</button>
        </div></div>`;
    });

    html += `<button class="btn-add-cat" onclick="addCategory('${activeSection}')">+ Add Category</button>`;
    div.innerHTML = html;
    area.appendChild(div);
  }

  // ── DATA MUTATIONS ──────────────────────────────────────────────────
  window.updateSection = (sk, field, val) => { menuData[sk][field] = val; };
  window.renderTabsOnly = () => {
    document.querySelectorAll('.tab-btn').forEach((btn, i) => {
      const key = Object.keys(menuData)[i];
      if (key) btn.textContent = menuData[key].label;
    });
  };

  window.renameCat = (sk, ci, newName) => {
    const cats = menuData[sk].categories;
    const keys = Object.keys(cats);
    const old = keys[ci];
    if (old === newName) return;
    const fresh = {};
    keys.forEach(k => { fresh[k === old ? newName : k] = cats[k]; });
    menuData[sk].categories = fresh;
  };

  window.deleteCat = (sk, ci) => {
    if (!confirm('Remove this category and all its items?')) return;
    const key = Object.keys(menuData[sk].categories)[ci];
    delete menuData[sk].categories[key];
    renderEditor();
  };

  window.addCategory = (sk) => {
    if (!menuData[sk].categories) menuData[sk].categories = {};
    menuData[sk].categories['New Category ' + Date.now()] = [];
    renderEditor();
  };

  window.updateItem = (sk, ci, ii, field, val) => {
    const catKey = Object.keys(menuData[sk].categories)[ci];
    menuData[sk].categories[catKey][ii][field] = val;
  };

  window.deleteItem = (sk, ci, ii) => {
    const catKey = Object.keys(menuData[sk].categories)[ci];
    menuData[sk].categories[catKey].splice(ii, 1);
    renderEditor();
  };

  window.addItem = (sk, ci) => {
    const catKey = Object.keys(menuData[sk].categories)[ci];
    menuData[sk].categories[catKey].push({ name:'', desc:'', price:'' });
    renderEditor();
  };

  // ── TOAST ───────────────────────────────────────────────────────────
  function showToast(msg, type) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = type + ' show';
    setTimeout(() => t.className = '', 3500);
  }

  // ── ESCAPE ──────────────────────────────────────────────────────────
  function esc(s) {
    if (!s) return '';
    return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── DEFAULT MENU ────────────────────────────────────────────────────
  function getDefaultMenu() {
    return {
      buffet: {
        label:"Buffet",
        note:"Our daily rotating buffet — freshly prepared each morning. Served 12:00 – 15:00.",
        price:"KES 1,500 per person",
        categories:{
          "Soups & Starters":[
            {name:"Soup of the Day",desc:"Ask your server for today's selection",price:""},
            {name:"Garden Salad Bar",desc:"Seasonal greens, cherry tomatoes, house dressings",price:""}
          ],
          "Main Course":[
            {name:"Grilled Tilapia",desc:"Lemon butter sauce, sautéed vegetables",price:""},
            {name:"Beef Stew",desc:"Slow-cooked with root vegetables in a rich jus",price:""}
          ],
          "Accompaniments":[
            {name:"Ugali",desc:"Traditional maize meal",price:""},
            {name:"Steamed Rice",desc:"Fragrant long-grain basmati",price:""}
          ],
          "Desserts":[
            {name:"Seasonal Fruit Platter",desc:"Fresh-cut fruits of the day",price:""}
          ]
        }
      },
      alaCarte:{
        label:"À La Carte",
        categories:{
          "Starters":[
            {name:"Prawn Cocktail",desc:"Tiger prawns, Marie Rose, crispy lettuce",price:"KES 950"}
          ],
          "Mains":[
            {name:"Grilled Ribeye",desc:"300g grain-fed ribeye, peppercorn sauce, fries",price:"KES 3,200"},
            {name:"Pan-Seared Salmon",desc:"Beurre blanc, asparagus, baby potatoes",price:"KES 2,400"}
          ],
          "Desserts":[
            {name:"Chocolate Fondant",desc:"Warm cake, vanilla ice cream, raspberry coulis",price:"KES 800"}
          ]
        }
      },
      bar:{
        label:"Redcliff Bar",
        categories:{
          "Cocktails":[
            {name:"Redcliff Sour",desc:"Bourbon, fresh lemon, honey syrup, egg white",price:"KES 950"},
            {name:"Nairobi Mule",desc:"Vodka, fresh ginger beer, lime, mint",price:"KES 850"}
          ],
          "Beers":[
            {name:"Tusker Lager",desc:"Kenya's classic 500ml",price:"KES 350"}
          ],
          "Non-Alcoholic":[
            {name:"Fresh Juice",desc:"Passion, mango, watermelon or mix",price:"KES 350"}
          ]
        }
      }
    };
  }
</script>
</body>
</html>
